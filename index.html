<script>
function generate() {
    const prompt = document.getElementById('prompt').value;
    const img = document.getElementById('output');
    const status = document.getElementById('status');

    if(!prompt) return alert("Eingabe fehlt!");

    img.style.display = "none";

    const seed = Math.floor(Math.random() * 999999);
    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}&width=1024&height=1024&nologo=true`;

    // 🧠 Liste mit möglichen "KI-Gedanken"
    const thoughts = [
        "neuanordnung der pixel...",
        "denke tiefer nach...",
        "analysiere lichtverhältnisse...",
        "optimiere kanten...",
        "generiere strukturmuster...",
        "simuliere realität...",
        "berechne perspektive...",
        "verbessere farbverläufe...",
        "rekonstruiere details...",
        "verfeinere texturen...",
        "erkenne objekte...",
        "kombiniere bildlayer...",
        "simuliere tiefenschärfe...",
        "optimiere kontraste...",
        "generiere schattenwurf...",
        "berechne lichtquellen...",
        "verarbeite neuronales netz...",
        "verstärke bildtiefe...",
        "erzeuge atmosphäre...",
        "justiere farbbalance..."
    ];

    let timeouts = [];
    let running = true;

    // 🔁 50 zufällige Status-Updates
    for(let i = 0; i < 50; i++) {
        const delay = Math.random() * 20000; // innerhalb von 20 Sekunden verteilt
        const randomText = thoughts[Math.floor(Math.random() * thoughts.length)];

        const t = setTimeout(() => {
            if(running) {
                status.innerText = randomText;
            }
        }, delay);

        timeouts.push(t);
    }

    // 📡 Bild laden
    img.onload = function() {
        running = false;
        timeouts.forEach(t => clearTimeout(t));
        status.innerText = "Fertig!";
        img.style.display = "block";
    };

    img.onerror = function() {
        running = false;
        timeouts.forEach(t => clearTimeout(t));
        status.innerText = "Server-Fehler. Der KI-Knoten ist überlastet.";
    };

    status.innerText = "Initialisiere neuronales Netzwerk...";
    img.src = url;
}
</script>
