<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AI Bildgenerator mit Puter</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 20px auto; }
    label { display: block; margin-top: 10px; }
    input, select, button { padding: 8px; width: 100%; margin-top: 4px; }
    #result img { max-width: 100%; margin-top: 15px; display: block; }
  </style>
</head>
<body>
  <h1>AI Bildgenerator (Puter.js)</h1>

  <label for="prompt">Prompt</label>
  <input id="prompt" type="text" placeholder="Beschreibe das Bild..." value="A peaceful mountain landscape at sunset">

  <label for="model">Modell</label>
  <select id="model">
    <option value="gpt-image-1">GPT Image 1</option>
    <option value="dall-e-3">DALL-E 3</option>
    <option value="gemini-2.5-flash-image-preview">Gemini 2.5 Flash Image Preview</option>
    <option value="black-forest-labs/flux-schnell">Flux.1 Schnell</option>
    <option value="stabilityai/stable-diffusion-3-medium">Stable Diffusion 3 Medium</option>
  </select>

  <button id="generate">Bild generieren</button>

  <div id="status"></div>
  <div id="result"></div>

  <script src="https://js.puter.com/v2/"></script>
  <script>
    const promptInput = document.getElementById('prompt');
    const modelSelect = document.getElementById('model');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const btn = document.getElementById('generate');

    btn.addEventListener('click', async () => {
      const prompt = promptInput.value.trim();
      const model = modelSelect.value;
      if (!prompt) {
        alert('Bitte einen Prompt eingeben.');
        return;
      }

      statusEl.textContent = 'Generiere Bild...';
      resultEl.innerHTML = '';

      try {
        const img = await puter.ai.txt2img(prompt, { model });
        resultEl.appendChild(img);
        statusEl.textContent = 'Fertig ✅';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Fehler: ' + err.message;
      }
    });
  </script>
</body>
</html>
